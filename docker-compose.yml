services:
  # sql server
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Incident@2026!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Incident@2026!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  # sql init db
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./sql/init.sql:/init.sql
    entrypoint: >
      bash -c "
        echo 'Waiting for SQL Server...';
        sleep 5;
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P 'Incident@2026!' -C -d master -i /init.sql;
        echo 'SQL init complete';
      "
    restart: "no"
  # MongoDB
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  # mock catalog
  mock-service:
    build: ./mock-service
    ports:
      - "3001:3001"
    healthcheck:
      test: wget --spider -q http://localhost:3001/health || exit 1
      interval: 10s
      timeout: 3s
      retries: 3
  # backend
  incident-api:
    build:
      context: ../incident_api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SQL_SERVER_HOST=sqlserver
      - SQL_SERVER_PORT=1433
      - SQL_SERVER_DB=IncidentDB
      - SQL_SERVER_USER=sa
      - SQL_SERVER_PASSWORD=Incident@2026!
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB=incident_events_db
      - SERVICE_CATALOG_URL=http://mock-service:3001
      - DEBUG=1
      - ALLOWED_HOSTS=*
    depends_on:
      sqlserver:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      mock-service:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:8000/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
  incident-web:
    build:
      context: ../incident_web
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      incident-api:
        condition: service_healthy

volumes:
  sqlserver-data:
  mongo-data:
